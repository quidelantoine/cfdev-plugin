name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  # ── 1. PHPUnit — Unit (rapide, sans Docker) ──────────────────────────────
  phpunit-unit:
    name: PHPUnit — Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - run: composer install --no-interaction --prefer-dist --no-progress

      - run: ./vendor/bin/phpunit --testsuite Unit

  # ── 2. PHPCS ─────────────────────────────────────────────────────────────
  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - run: composer install --no-interaction --prefer-dist --no-progress

      - run: vendor/bin/phpcs

  # ── 3. ESLint ────────────────────────────────────────────────────────────
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint:js -- --max-warnings 0

  # ── 5. PHPStan niveau 8 ──────────────────────────────────────────────────
  phpstan:
    name: PHPStan — niveau 8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - run: composer install --no-interaction --prefer-dist --no-progress

      - run: vendor/bin/phpstan analyse --no-progress

  # ── 6. PHPUnit — Integration ─────────────────────────────────────────────
  phpunit-integration:
    name: PHPUnit — Integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wpuser
          MYSQL_PASSWORD: wppassword
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      WP_PHPUNIT__DIR: ${{ github.workspace }}/vendor/wp-phpunit/wp-phpunit
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mysqli, pdo_mysql
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install WP-CLI
        run: |
          curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Download WordPress core (ABSPATH)
        run: wp core download --path=/tmp/wordpress --version=latest

      - name: Write wp-tests-config.php
        run: |
          cat > wp-tests-config.php << 'WPTESTSCFG'
          <?php
          define('DB_NAME', 'wordpress_test');
          define('DB_USER', 'wpuser');
          define('DB_PASSWORD', 'wppassword');
          define('DB_HOST', '127.0.0.1');
          define('DB_CHARSET', 'utf8mb4');
          define('DB_COLLATE', '');
          define('ABSPATH', '/tmp/wordpress/');
          define('WP_TESTS_DOMAIN', 'localhost');
          define('WP_TESTS_EMAIL', 'admin@example.com');
          define('WP_TESTS_TITLE', 'CFDev Integration Tests');
          define('WP_PHP_BINARY', 'php');
          $table_prefix = 'wptests_';
          WPTESTSCFG

      - run: ./vendor/bin/phpunit --testsuite Integration --bootstrap tests/Integration/bootstrap.php

  # ── 7. Cypress — E2E (wp-env + matrix parallèle) ─────────────────────────
  cypress:
    name: Cypress — E2E (${{ matrix.group }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Groupe A — login, flat-fields, validation, bundle
          - { group: "01-04", spec: "cypress/e2e/0[1-4]*.cy.js" }
          # Groupe B — tabs (page+post), accordion (page+post), term-meta
          - { group: "05-07", spec: "cypress/e2e/0[5-7]*.cy.js" }
          # Groupe C — user-meta, REST, admin-pages, front-end, code-modal, field-icons
          - { group: "08-13", spec: "cypress/e2e/0[89]*.cy.js,cypress/e2e/1[0-3]*.cy.js" }
          # Groupe D — media fields, datetime/multiselect/relations
          - { group: "14-15", spec: "cypress/e2e/1[4-5]*.cy.js" }

    steps:
      - uses: actions/checkout@v4

      # ── Node / npm ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # ── Cypress binary ──────────────────────────────────────────────────────
      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # ── Docker images (wordpress + mariadb) — clé mensuelle ─────────────────
      # Sur cache hit  : docker load ~25 s  → wp-env start ~30 s
      # Sur cache miss : docker pull ~90 s  → wp-env start ~60 s, images sauvées en post-step
      - name: Docker cache key
        id: docker-month
        run: echo "value=$(date +%Y%m)" >> $GITHUB_OUTPUT

      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-wp-images.tar
          key: docker-wp-env-php8.3-${{ steps.docker-month.outputs.value }}
          restore-keys: docker-wp-env-php8.3-

      - name: Load Docker images from cache
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-wp-images.tar

      # ── wp-env ──────────────────────────────────────────────────────────────
      # Lance Docker (wordpress:php8.3-fpm + mariadb:lts), installe WordPress,
      # active cfdev-plugin + classic-editor, mappe le mu-plugin via mappings,
      # injecte les constantes (CFDEV_DEMO, DISABLE_WP_CRON) via config,
      # puis afterSetup exécute bin/wp-env-seed.sh (options WP + page spec-11).
      - name: Start wp-env
        run: npx wp-env start

      # Persiste les images wordpress/mariadb pour les runs suivants.
      # actions/cache@v4 auto-save en post-step si le fichier existe.
      - name: Save Docker images for next run
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          IMAGES=$(docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -E '^(wordpress|mariadb)' | grep -v '<none>' | tr '\n' ' ')
          [ -n "${IMAGES// }" ] && docker save $IMAGES -o /tmp/docker-wp-images.tar || true

      # ── Préchauffage authentifié ────────────────────────────────────────────
      # Réplique exactement ce que fait Cypress spec-01 : login form → wp-admin.
      # Sans ça, le premier cy.session() échoue en CI car le cold start PHP-FPM
      # dans Docker dépasse defaultCommandTimeout sur la première requête réelle.
      # On fait aussi un retry loop pour absorber le warm-up MariaDB résiduel.
      - name: Warm up WordPress
        run: |
          timeout 30 bash -c \
            'until curl -sf http://localhost:8888/wp-login.php > /dev/null; do sleep 2; done'
          curl -s -c /tmp/wpcookies.txt \
            http://localhost:8888/wp-login.php > /dev/null
          curl -s -b /tmp/wpcookies.txt -c /tmp/wpcookies.txt \
            --data-urlencode "log=admin" \
            --data-urlencode "pwd=password" \
            -d "wp-submit=Log+In&redirect_to=%2Fwp-admin%2F&testcookie=1" \
            http://localhost:8888/wp-login.php > /dev/null
          curl -s -b /tmp/wpcookies.txt \
            http://localhost:8888/wp-admin/ > /dev/null || true
          curl -s -b /tmp/wpcookies.txt \
            "http://localhost:8888/wp-admin/post-new.php?post_type=post" \
            > /dev/null || true
          # Pré-chauffe le template cfdev-test (spec 11) — vérifie aussi que
          # la page créée par le seed est accessible via ses permaliens.
          curl -s -b /tmp/wpcookies.txt \
            "http://localhost:8888/cfdev-test/?post_id=1" \
            > /dev/null || true

      # ── Cypress ─────────────────────────────────────────────────────────────
      # Credentials wp-env par défaut : admin / password
      - name: Run Cypress E2E — ${{ matrix.group }}
        run: |
          npx cypress run \
            --browser chrome \
            --spec '${{ matrix.spec }}'
        env:
          CYPRESS_BASE_URL: http://localhost:8888
          CYPRESS_WP_USER: admin
          CYPRESS_WP_PASS: password

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.group }}
          path: cypress/screenshots/
          if-no-files-found: ignore
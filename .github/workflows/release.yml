name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. Quality checks ────────────────────────────────────────────────────────
  quality:
    name: PHPStan · PHPCS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPCS
        run: vendor/bin/phpcs

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M

  # ── 2. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPUnit — Unit
        run: vendor/bin/phpunit --testsuite Unit

  # ── 3. Build & release ───────────────────────────────────────────────────────
  release:
    name: Build ZIP · GitHub Release
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build distribution ZIP
        run: |
          rsync -r \
            --exclude-from=.distignore \
            --exclude='.distignore' \
            . ./dist/cfdev-plugin/
          cd dist
          zip -r cfdev-plugin-${{ steps.version.outputs.VERSION }}.zip cfdev-plugin/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CFDev v${{ steps.version.outputs.VERSION }}
          body: |
            ## CFDev v${{ steps.version.outputs.VERSION }}

            **Install:** download `cfdev-plugin-${{ steps.version.outputs.VERSION }}.zip` and upload via WordPress Admin → Plugins → Add New → Upload Plugin.

            **Requirements:** PHP 8.2+ · WordPress 6.5+
          files: dist/cfdev-plugin-${{ steps.version.outputs.VERSION }}.zip
          fail_on_unmatched_files: true
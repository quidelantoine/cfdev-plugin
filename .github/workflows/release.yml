name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    name: Build ZIP · GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build distribution ZIP
        run: |
          git archive HEAD \
            --prefix=cfdev-plugin/ \
            --format=zip \
            -o cfdev-plugin-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CFDev v${{ steps.version.outputs.VERSION }}
          body: |
            ## CFDev v${{ steps.version.outputs.VERSION }}

            **Install:** download `cfdev-plugin-${{ steps.version.outputs.VERSION }}.zip` and upload via WordPress Admin → Plugins → Add New → Upload Plugin.

            **Requirements:** PHP 8.2+ · WordPress 6.5+
          files: cfdev-plugin-${{ steps.version.outputs.VERSION }}.zip
          fail_on_unmatched_files: true